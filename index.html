<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Re:Phrase</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f5;--card:#fff;--blue:#4F6CFF;--blue2:#3b5bdb;--bluel:#EEF1FF;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--purple:#7c3aed;--mine:#4F6CFF;--other:#fff;--text:#111;--t2:#777;--t3:#aaa;--border:#ebebeb;--chatbg:#F0EDE8}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Noto Sans KR',sans-serif;height:100vh;overflow:hidden;background:var(--bg)}

/* ═══ LANDING ═══ */
.landing{position:fixed;inset:0;z-index:500;background:#fff;display:flex;align-items:center;justify-content:center;transition:opacity .4s}
.landing.hide{opacity:0;pointer-events:none}
.land{text-align:center;padding:40px;max-width:400px}
.land .logo{font-size:38px;font-weight:900;color:var(--blue);margin-bottom:6px;letter-spacing:-1px}
.land .logo span{color:var(--red)}
.land .tagline{font-size:15px;color:var(--t2);line-height:1.5;margin-bottom:36px}
.land .login{width:100%;padding:14px;border-radius:14px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:.2s;margin-bottom:10px}
.land .login:hover{background:var(--blue2)}
.land .skip{font-size:12px;color:var(--t3);cursor:pointer;text-decoration:underline}

/* ═══ APP ═══ */
.app{display:none;height:100vh;flex-direction:row}
.app.show{display:flex}

/* Sidebar */
.side{width:320px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column}
.side-top{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.side-top .slogo{font-size:17px;font-weight:800;color:var(--blue)}
.side-top .slogo span{color:var(--red)}
.side-top .gear{margin-left:auto;width:30px;height:30px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.cl{flex:1;overflow-y:auto}
.ci{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #fafafa;transition:.1s}
.ci:hover{background:#fafafa}.ci.act{background:var(--bluel)}
.ci .av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.ci .meta{flex:1;min-width:0}
.ci .nm{font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px}
.ci .pv{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ci .tm{font-size:9px;color:var(--t3);margin-left:auto;flex-shrink:0}
.badge{font-size:8px;padding:1px 5px;border-radius:4px;font-weight:600}
.badge.w{background:var(--bluel);color:var(--blue)}.badge.p{background:#dcfce7;color:#166534}
.unr{width:16px;height:16px;border-radius:50%;background:var(--blue);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Main */
.main{flex:1;display:flex;flex-direction:column;position:relative}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);gap:6px}
.empty .eic{font-size:40px}.empty h3{font-size:16px;color:var(--text)}.empty p{font-size:12px}

/* Chat header */
.chdr{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px}
.chdr .av{width:32px;height:32px;font-size:12px}
.chdr h4{font-size:14px;font-weight:600}.chdr .csub{font-size:10px;color:var(--t3)}
.chdr .rel-chip{margin-left:auto;display:flex;align-items:center;gap:6px}
.chdr .rel-badge{padding:3px 8px;border-radius:6px;font-size:9px;font-weight:600;background:var(--bluel);color:var(--blue)}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:12px 50px;display:flex;flex-direction:column;gap:4px;background:var(--chatbg)}
.dsep{text-align:center;font-size:10px;color:var(--t3);background:rgba(255,255,255,.7);display:inline-block;align-self:center;padding:2px 10px;border-radius:6px;margin:4px 0}
.msg{max-width:70%;padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.55;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1}}
.msg.o{background:var(--other);align-self:flex-start;border-bottom-left-radius:3px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.msg.m{background:var(--mine);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.msg .sn{font-size:9px;font-weight:600;color:var(--t2);margin-bottom:1px}
.msg .tm{font-size:8px;opacity:.5;text-align:right;margin-top:2px}
.ehl{cursor:pointer;border-radius:3px;padding:0 1px;transition:.1s}.ehl:hover{background:rgba(79,108,255,.15)}
.msg .hint{font-size:9px;color:var(--blue);margin-top:4px;cursor:pointer;padding:3px 8px;background:var(--bluel);border-radius:6px;display:inline-block;border:1px solid rgba(79,108,255,.2);animation:hpulse 2s infinite}
@keyframes hpulse{0%,100%{box-shadow:0 0 0 0 rgba(79,108,255,.2)}50%{box-shadow:0 0 0 4px rgba(79,108,255,.1)}}
.msg.emoji-s{font-size:13px}

/* Reactions */
.rxr{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap}
.rx{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:10px;background:rgba(0,0,0,.05);font-size:11px;cursor:pointer}
.rx:hover{background:rgba(0,0,0,.08)}
.rx .rn{font-size:8px;color:var(--t2);max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rxa{width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.04);font-size:10px;cursor:pointer;border:1px dashed #ccc;display:inline-flex;align-items:center;justify-content:center}

/* Quick reaction bar on hover */
.msg.o{position:relative}
.msg.o .qrx{display:none;position:absolute;top:-8px;right:-4px;background:#fff;border-radius:16px;padding:2px 4px;box-shadow:0 2px 8px rgba(0,0,0,.12);gap:1px;z-index:10}
.msg.o:hover .qrx{display:flex}
.qrx button{width:26px;height:26px;border:none;background:none;font-size:15px;cursor:pointer;border-radius:50%;transition:.1s}
.qrx button:hover{background:#f0f0f0;transform:scale(1.2)}

/* ═══ COMPOSER ═══ */
.carea{border-top:1px solid var(--border);background:var(--card)}

/* Formality slider — relationship-aware */
.fbar{display:none;padding:8px 16px;align-items:center;gap:8px;border-bottom:1px solid #f5f5f5}
.fbar.show{display:flex}
.fbar label{font-size:11px;color:var(--t2);font-weight:600;white-space:nowrap}
.fbar input[type=range]{flex:1;accent-color:var(--blue);cursor:pointer}
.fbar .fv{font-size:11px;font-weight:700;color:var(--blue);min-width:50px;text-align:right}

/* Tone suggestion */
.tsug{display:none;padding:6px 16px 4px}
.tsug.show{display:block}
.tsug .tl{font-size:9px;color:var(--blue);font-weight:600;margin-bottom:4px}
.tsug .topt{padding:10px 14px;background:var(--bluel);border:1.5px solid var(--blue);border-radius:12px;font-size:13px;cursor:pointer;transition:.15s;margin-bottom:4px;position:relative}
.tsug .topt:hover{background:#dde3ff}
.tsug .topt .tap-hint{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--blue);opacity:.5;pointer-events:none}
.tsug .talts{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px}
.tsug .talt{padding:5px 10px;border-radius:12px;font-size:11px;border:1px solid var(--border);color:var(--t2);background:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tsug .talt:hover{border-color:var(--blue);color:var(--blue)}

/* Emoji recommendation strip — always visible when typing */
.erec{display:none;padding:5px 14px;gap:5px;align-items:center;border-bottom:1px solid #f5f5f5;background:#fafbff}
.erec.show{display:flex}
.erec .erl{font-size:9px;color:var(--blue);font-weight:600;flex-shrink:0;margin-right:2px}
.erec .erb{width:34px;height:34px;border-radius:10px;font-size:20px;cursor:pointer;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;transition:.15s;position:relative}
.erec .erb:hover{background:var(--bluel);border-color:var(--blue);transform:scale(1.15)}
.erec .erb .er-tip{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;white-space:nowrap;pointer-events:none}
.erec .erb:hover .er-tip{display:block}
.erec .er-add{font-size:11px;color:var(--t3);margin-left:auto;cursor:pointer}
.erec .er-add:hover{color:var(--blue)}

/* Warning */
.wbar{display:none;padding:4px 14px;font-size:10px;color:#b45309;background:#fef3c7;align-items:center;gap:4px}
.wbar.show{display:flex}
.wbar .wd{margin-left:auto;font-size:9px;padding:1px 6px;border-radius:4px;border:1px solid #b45309;background:none;color:#b45309;cursor:pointer}

/* Token bar */
.tkbar{display:none;padding:4px 12px;gap:3px;flex-wrap:wrap;border-bottom:1px solid #f5f5f5}
.tkbar.show{display:flex}
.tk{padding:4px 8px;border-radius:7px;font-size:10px;border:1px solid var(--border);background:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:2px}
.tk:hover{border-color:var(--blue);background:var(--bluel)}
.tk.st{border-color:#fbbf24;background:#fffbeb}.tk.st:hover{background:#fef3c7}
.tksep{width:1px;height:14px;background:var(--border)}

/* Render preview */
.rpv{display:none;padding:4px 16px;background:#faf9f6;border-top:1px solid #eee;font-size:10px;color:var(--t2)}
.rpv.show{display:block}
.rpv .rpm{display:inline-block;padding:4px 8px;border-radius:8px;background:var(--mine);color:#fff;font-size:12px;margin:2px 0}

.crow{display:flex;align-items:flex-end;padding:6px 10px 10px;gap:5px}
.crow textarea{flex:1;resize:none;border:1.5px solid var(--border);border-radius:20px;padding:8px 14px;font-size:13px;font-family:inherit;outline:none;min-height:36px;max-height:80px}
.crow textarea:focus{border-color:var(--blue)}
.cb{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cb.eb{background:none;font-size:18px;border:1.5px solid var(--border)}.cb.eb:hover{border-color:var(--blue)}
.cb.sb{background:var(--blue);color:#fff;font-size:14px}.cb.sb:hover{opacity:.9}

/* Picker */
.pkr{display:none;border-top:1px solid var(--border);background:#fff;max-height:180px;overflow-y:auto}
.pkr.show{display:block}
.pktabs{display:flex;border-bottom:1px solid var(--border)}
.pkt{flex:1;padding:7px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent}
.pkt.act{color:var(--blue);border-bottom-color:var(--blue)}
.pkb{padding:8px 10px}
.pkst{font-size:9px;font-weight:600;color:var(--t3);margin:6px 0 3px}.pkst:first-child{margin-top:0}
.pkg{display:flex;flex-wrap:wrap;gap:1px}
.ec{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:7px;cursor:pointer;position:relative;transition:.1s}
.ec:hover{background:#eee;transform:scale(1.1)}
.vd{position:absolute;top:0;right:1px;width:6px;height:6px;border-radius:50%;border:1.5px solid #fff}
.vd.g{background:var(--green)}.vd.y{background:var(--yellow)}.vd.r{background:var(--red)}

/* ═══ OVERLAYS ═══ */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.ov.show{display:flex}
.ovc{background:#fff;border-radius:18px;padding:24px;width:300px;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,.15)}

/* Tooltip */
.ovc .tbig{font-size:48px;margin-bottom:4px}
.ovc .tmn{font-size:15px;font-weight:700}.ovc .tsb{font-size:11px;color:var(--t2);margin:2px 0 10px}
.dbar{display:flex;border-radius:6px;overflow:hidden;height:24px;margin-bottom:6px}
.dbar .sg{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.sg.pos{background:var(--green)}.sg.neu{background:var(--yellow)}.sg.neg{background:var(--red)}
.dlg{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:6px}
.dlg span{font-size:9px;padding:2px 6px;border-radius:5px}
.dlg .pos{background:#dcfce7;color:#166534}.dlg .neu{background:#fef9c3;color:#854d0e}.dlg .neg{background:#fee2e2;color:#991b1b}
.ttcul{margin-top:8px;padding:8px;border-radius:8px;background:#fef3c7;font-size:10px;color:#92400e;text-align:left;line-height:1.4}
.tta11{margin-top:6px;padding:8px;border-radius:8px;background:var(--bluel);font-size:10px;color:var(--blue);text-align:left;line-height:1.4}
.cls{margin-top:10px;padding:6px 20px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12px;cursor:pointer}.cls:hover{background:#f5f5f5}

/* Note modal */
.ntc{text-align:left}
.ntc h4{font-size:14px;font-weight:700;margin-bottom:8px}
.ntc .epk{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap}
.ntc .epk button{padding:5px 8px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:16px;cursor:pointer}
.ntc .epk button:hover{border-color:var(--blue)}.ntc .epk button.sel{border-color:var(--blue);background:var(--bluel)}
.ntc input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;outline:none;margin-bottom:10px;font-family:inherit}
.ntc input:focus{border-color:var(--blue)}
.nbtns{display:flex;gap:6px;justify-content:flex-end}
.nbtns button{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.nbtns .nc{background:#eee}.nbtns .no{background:var(--blue);color:#fff}

/* Settings */
.ov.set{align-items:flex-end;justify-content:center}
.stsh{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:400px}
.stsh h4{font-size:14px;font-weight:700;margin-bottom:10px}
.sr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5}.sr:last-of-type{border:none}
.sr .sn{font-size:12px}.sr .sd{font-size:9px;color:var(--t3);margin-top:1px}
.tgl{width:40px;height:22px;border-radius:11px;background:#ddd;position:relative;cursor:pointer;transition:.3s;flex-shrink:0}
.tgl.on{background:var(--blue)}
.tgl::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.3s;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.tgl.on::after{left:20px}
.stcl{width:100%;padding:8px;border:none;background:#f5f5f5;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;margin-top:10px}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
</style>
</head>
<body>

<!-- LANDING -->
<div class="landing" id="landing">
  <div class="land">
    <div class="logo">Re<span>:</span>Phrase</div>
    <p class="tagline">같은 이모지, 다른 해석.<br>관계와 맥락을 이해하는 스마트 메신저.</p>
    <button class="login" onclick="startApp()">시작하기</button>
    <div class="skip" onclick="startApp()">둘러보기</div>
  </div>
</div>

<!-- OVERLAYS -->
<div class="ov" id="ttOv" onclick="if(event.target===this)this.classList.remove('show')"><div class="ovc" id="ttC"></div></div>
<div class="ov" id="ntOv" onclick="if(event.target===this)this.classList.remove('show')"><div class="ovc ntc" id="ntC"></div></div>
<div class="ov set" id="stOv" onclick="if(event.target===this)this.classList.remove('show')"><div class="stsh" id="stC"></div></div>

<!-- APP -->
<div class="app" id="app">
  <div class="side">
    <div class="side-top">
      <div class="slogo">Re<span>:</span>Phrase</div>
      <button class="gear" onclick="openSet()">⚙️</button>
    </div>
    <div class="cl" id="chatList"></div>
  </div>
  <div class="main" id="mainArea">
    <div class="empty"><div class="eic">💬</div><h3>Re:Phrase</h3><p>대화를 선택하세요</p></div>
  </div>
</div>

<script>
// ═══ DATA ═══
const CFG={emojiSize:true,panelSwitch:true,renderPreview:true,toneAid:true};

// Context-dependent emoji interpretation
const ED_CTX={
  formal:{
    '🙂':{v:'r',m:'형식적 마무리 또는 불만',d:[{l:'형식적 마무리',p:40,t:'neu'},{l:'불만/냉소',p:35,t:'neg'},{l:'진짜 미소',p:25,t:'pos'}]},
    '👍':{v:'y',m:'확인 — 무성의할 수 있음',d:[{l:'단순 확인',p:50,t:'neu'},{l:'긍정',p:35,t:'pos'},{l:'귀찮음',p:15,t:'neg'}]},
    '🤔':{v:'r',m:'재검토 요청 가능성',d:[{l:'수정 요청',p:45,t:'neg'},{l:'궁금',p:35,t:'neu'},{l:'흥미',p:20,t:'pos'}]},
    '🙃':{v:'r',m:'불만 또는 비꼼',d:[{l:'짜증/불만',p:50,t:'neg'},{l:'체념',p:30,t:'neu'},{l:'장난',p:20,t:'pos'}]},
    '🫡':{v:'y',m:'수행하겠습니다',d:[{l:'알겠습니다',p:55,t:'pos'},{l:'형식적',p:30,t:'neu'},{l:'비꼼',p:15,t:'neg'}]},
  },
  peer:{
    '🙂':{v:'r',m:'"OK" 또는 비꼼',d:[{l:'OK/친근',p:35,t:'pos'},{l:'어색',p:30,t:'neu'},{l:'비꼼',p:35,t:'neg'}]},
    '👀':{v:'r',m:'관심 또는 "지켜보겠다"',d:[{l:'흥미',p:35,t:'pos'},{l:'지켜봄',p:40,t:'neu'},{l:'압박',p:25,t:'neg'}]},
    '😅':{v:'y',m:'미안 또는 짜증',d:[{l:'진짜 민망',p:45,t:'neu'},{l:'가볍게',p:30,t:'pos'},{l:'짜증',p:25,t:'neg'}]},
    '🙃':{v:'r',m:'장난 또는 빈정',d:[{l:'장난',p:35,t:'pos'},{l:'체념',p:25,t:'neu'},{l:'빈정거림',p:40,t:'neg'}]},
    '🥲':{v:'y',m:'웃지만 힘든 상황',d:[{l:'감동',p:30,t:'pos'},{l:'힘들지만 괜찮은 척',p:45,t:'neu'},{l:'서운함',p:25,t:'neg'}]},
  },
  personal:{
    '😂':{v:'g',m:'ㅋㅋㅋ 진짜 웃김',d:[{l:'진짜 웃김',p:70,t:'pos'},{l:'리액션',p:25,t:'neu'},{l:'비웃음',p:5,t:'neg'}]},
    '👍':{v:'g',m:'ㅇㅋ — 가벼운 확인',d:[{l:'알겠어',p:75,t:'pos'},{l:'귀찮',p:20,t:'neu'},{l:'무시',p:5,t:'neg'}]},
    '🙂':{v:'y',m:'"할 말 없다" 또는 미소',d:[{l:'그냥 미소',p:35,t:'pos'},{l:'할 말 없음',p:40,t:'neu'},{l:'삐짐/서운',p:25,t:'neg'}]},
    '🫠':{v:'y',m:'지쳤다 · 녹아내림',d:[{l:'귀여운 지침',p:40,t:'pos'},{l:'진짜 지침',p:40,t:'neu'},{l:'포기',p:20,t:'neg'}]},
    '💅':{v:'y',m:'쿨한 척 · 무관심',d:[{l:'자신감',p:40,t:'pos'},{l:'상관없음',p:35,t:'neu'},{l:'은근 무시',p:25,t:'neg'}]},

function renderList(){
  const el=document.getElementById('chatList');el.innerHTML='';
  CHATS.forEach(c=>{
    const last=c.msgs[c.msgs.length-1];
    const div=document.createElement('div');
    div.className='ci'+(curChat?.id===c.id?' act':'');
    div.innerHTML=`<div class="av" style="background:${c.col}">${c.av}</div><div class="meta"><div class="nm">${c.name} <span class="badge ${c.type==='work'?'w':'p'}">${c.type==='work'?'업무':'개인'}</span></div><div class="pv">${last.t}</div></div><span class="tm">${last.tm}</span>`;
    div.onclick=()=>openChat(c);
    el.appendChild(div);
  });
}

  m.innerHTML=`
    <div class="chdr"><div class="av" style="background:${c.col}">${c.av}</div><div><h4>${c.name}</h4><div class="csub">${isWork?'업무':'개인'}${c.formal?' · 공식':''}${c.group?' · 그룹':''}</div></div>

      <div class="tsug" id="tsug"></div>
      <div class="erec" id="erec"></div>
      <div class="wbar" id="wb"><span id="wt"></span><button class="wd" onclick="this.parentElement.classList.remove('show')">무시</button></div>
      ${showTokens?`<div class="tkbar show">
        <button class="tk" onclick="ins('✔')">✔</button><button class="tk" onclick="ins('👍')">👍</button><button class="tk" onclick="ins('🙏')">🙏</button><div class="tksep"></div>
        <button class="tk st" onclick="addSt('⏳','확인 중')">⏳ 확인 중</button><button class="tk st" onclick="addSt('🚫','블로킹')">🚫</button><button class="tk st" onclick="addSt('⚠️','지연')">⚠️</button><button class="tk st" onclick="addSt('✅','완료')">✅</button>
      </div>`:''}
      <div class="crow">
        <button class="cb eb" onclick="document.getElementById('pkr').classList.toggle('show')">😊</button>
        <textarea id="inp" rows="1" placeholder="${c.formal?c.name+'님에게 답장...':'메시지 입력...'}" oninput="onInp()"></textarea>

      <div class="pkb" id="pkb"></div>

  renderMsgs();
  bldPkr(isWork?'work':'personal');
  const inp=document.getElementById('inp');

}

// ═══ MESSAGES ═══
function renderMsgs(){
  const el=document.getElementById('ma');if(!el)return;
  const c=curChat;el.innerHTML='<div class="dsep">오늘</div>';
  c.msgs.forEach((msg,idx)=>{
    const me=msg.s==='me';const div=document.createElement('div');
    const se=/^[\p{Emoji_Presentation}\p{Emoji}\uFE0F]{1,4}$/u.test(msg.t.trim())&&msg.t.trim().length<=8;
    div.className=`msg ${me?'m':'o'}${se&&CFG.emojiSize?' emoji-s':''}`;
    let html=msg.t.replace(/([\p{Emoji_Presentation}\p{Emoji}\uFE0F]+)/gu,(m)=>ED[m]?`<span class="ehl" onclick="showTT('${m}')">${m}</span>`:m);
    let rxH='';
    if(msg.rx?.length){rxH='<div class="rxr">'+msg.rx.map(r=>`<span class="rx">${r.e}${r.c>1?' '+r.c:''}${r.note?`<span class="rn">${r.note}</span>`:''}</span>`).join('')+`<span class="rxa" onclick="openNote(${idx})">+</span></div>`}
    else if(!me){rxH=`<div class="rxr"><span class="rxa" onclick="openNote(${idx})">+</span></div>`}
    let hintH='';
    if(!me){const ems=msg.t.match(/([\p{Emoji_Presentation}\p{Emoji}\uFE0F])/gu);if(ems?.some(e=>getED(e)&&(getED(e).v==='r'||getED(e).v==='y'))){const e=ems.find(e=>getED(e)&&(getED(e).v==='r'||getED(e).v==='y'));if(e)hintH=`<div class="hint" onclick="showTT('${e}')">🔍 이 이모지, 어떤 뜻일까?</div>`}}
    const qrxH=!me?`<div class="qrx"><button onclick="quickRx(${idx},'👍')">👍</button><button onclick="quickRx(${idx},'❤️')">❤️</button><button onclick="quickRx(${idx},'😂')">😂</button><button onclick="quickRx(${idx},'🙏')">🙏</button><button onclick="openNote(${idx})">+</button></div>`:'';
    div.innerHTML=`${qrxH}${!me&&c.group?`<div class="sn">${msg.s}</div>`:''}${html}${hintH}${rxH}<div class="tm">${msg.tm}</div>`;
    if(!me){div.addEventListener('contextmenu',e=>{e.preventDefault();openNote(idx)});div.addEventListener('dblclick',()=>openNote(idx))}
    el.appendChild(div);
  });
  el.scrollTop=el.scrollHeight;
}

// ═══ TOOLTIP ═══
function showTT(emoji){
  const d=getED(emoji);if(!d)return;
  const ctx=curChat.type==='personal'?'개인 대화':curChat.formal?'공식 대화':curChat.name?.includes('Sarah')?'해외팀':'동료 대화';
  document.getElementById('ttC').innerHTML=`<div class="tbig">${emoji}</div><div class="tmn">${d.m}</div><div class="tsb">현재 맥락: ${ctx}</div>
    <div class="dbar">${d.d.map(x=>`<div class="sg ${x.t}" style="width:${x.p}%">${x.p}%</div>`).join('')}</div>
    <div class="dlg">${d.d.map(x=>`<span class="${x.t}">${x.l} ${x.p}%</span>`).join('')}</div>
    ${d.c?`<div class="ttcul">🌍 ${d.c}</div>`:''}
    <button class="cls" onclick="document.getElementById('ttOv').classList.remove('show')">닫기</button>`;
  document.getElementById('ttOv').classList.add('show');
}

// ═══ PICKER ═══
function bldPkr(mode,el){
  if(el){document.querySelectorAll('.pkt').forEach(t=>t.classList.remove('act'));el.classList.add('act')}
  const b=document.getElementById('pkb');if(!b)return;
  const emojis=mode==='work'?WE:PE;const pins=mode==='work'?['✔','👍','🙏']:['❤️','🔥','😂'];
  b.innerHTML=`<div class="pkst">📌 고정</div><div class="pkg">${pins.map(e=>`<div class="ec" onclick="pickE('${e}')">${e}${ED[e]?`<span class="vd ${ED[e].v}"></span>`:''}</div>`).join('')}</div>
    <div class="pkst">전체</div><div class="pkg">${emojis.map(e=>`<div class="ec" onclick="pickE('${e}')" onmousedown="lt=setTimeout(()=>showTT('${e}'),400)" onmouseup="clearTimeout(lt)" onmouseleave="clearTimeout(lt)">${e}${ED[e]?`<span class="vd ${ED[e].v}"></span>`:''}</div>`).join('')}</div>`;
}
function pickE(e){document.getElementById('inp').value+=e;document.getElementById('inp').dispatchEvent(new Event('input'));document.getElementById('pkr').classList.remove('show')}
function addEmojiToMsg(e){
  const inp=document.getElementById('inp');
  // Add space before emoji if text doesn't end with space
  if(inp.value.length>0&&!inp.value.endsWith(' ')&&!/[\p{Emoji}]/u.test(inp.value.slice(-1)))inp.value+=' ';
  inp.value+=e;
  inp.focus();
}
function ins(e){document.getElementById('inp').value+=e;document.getElementById('inp').focus()}

// ═══ COMPOSER ═══
function onInp(){
  const el=document.getElementById('inp');
  el.style.height='auto';el.style.height=Math.min(el.scrollHeight,80)+'px';
  const v=el.value.trim();const c=curChat;if(!c)return;

  // Tone suggestion
  if(c.type==='work'&&CFG.toneAid&&v.length>0){updateTone(v)}
  else{document.getElementById('tsug')?.classList.remove('show')}

  // Emoji recommendation based on content — multi-match
  if(v.length>=1){
    const low=v.toLowerCase();
    let matched=null;
    for(const rule of EMOJI_REC_DATA){
      if(rule.k.some(k=>low.includes(k))){matched=rule;break}
    }
    const erec=document.getElementById('erec');
    if(matched&&erec){
      erec.innerHTML=`<span class="erl">💡 ${matched.tip}</span>${matched.e.slice(0,5).map(e=>`<button class="erb" onclick="addEmojiToMsg('${e}')">${e}<span class="er-tip">${ED[e]?.m||e}</span></button>`).join('')}<span class="er-add" onclick="document.getElementById('pkr').classList.add('show')">더보기 →</span>`;
      erec.classList.add('show');
    } else erec?.classList.remove('show');
  } else document.getElementById('erec')?.classList.remove('show');

  // Emoji warning
  if(c.formal){
    const em=v.match(/(\p{Emoji_Presentation}|\p{Emoji}\uFE0F)/u);
    if(em){const ed=getED(em[0]);if(ed&&(ed.v==='r'||ed.v==='y')){document.getElementById('wt').textContent=`⚠️ "${em[0]}" — ${ed.d.map(x=>x.l+' '+x.p+'%').join(', ')}`;document.getElementById('wb').classList.add('show')}else document.getElementById('wb')?.classList.remove('show')}else document.getElementById('wb')?.classList.remove('show');
  }

  // Render preview
  const rpv=document.getElementById('rpv');
  if(CFG.renderPreview&&v&&rpv){
    const se=/^[\p{Emoji_Presentation}\p{Emoji}\uFE0F]{1,4}$/u.test(v)&&v.length<=8;
    if(se&&CFG.emojiSize)rpv.innerHTML=`👁 <span class="rpm" style="font-size:12px">${v}</span> 표준 크기`;
    else if(se)rpv.innerHTML=`👁 <span class="rpm" style="font-size:32px;background:none;color:inherit">${v}</span> 확대 표시`;
    else rpv.innerHTML=`👁 <span class="rpm">${v}</span>`;
    rpv.classList.add('show');
  } else rpv?.classList.remove('show');
}

function onFR(){
  const icons=['','😊','🙂','📝','🏢','🎩'];
  document.getElementById('fv').textContent=icons[document.getElementById('fr').value];
  const v=document.getElementById('inp')?.value.trim();
  if(v) updateTone(v);
}

function updateTone(raw){
  const ts=document.getElementById('tsug');if(!ts)return;
  const lv=parseInt(document.getElementById('fr')?.value||3);
  const low=raw.toLowerCase();
  const eng=isEng(raw);
  const tones=eng?TONES_EN:TONES_KR;
  const matched=tones.find(t=>t.m(low));
  const idx=lv-1;
  let main=matched.L[idx];if(typeof main==='function')main=main(raw);
  if(main===raw){ts.classList.remove('show');return}
  let alts=(matched.A[idx]||[]).map(a=>typeof a==='function'?a(raw):a).filter(a=>a&&a!==main);
  const lvLabels=eng?['casual','friendly','polite','formal','very formal']:['편안','친근','보통','정중','매우 정중'];
  ts.innerHTML=`<div class="tl">✨ ${matched.i} · ${lvLabels[idx]}</div><div class="topt" data-v="${main.replace(/"/g,'&quot;')}" onclick="useTone(this.dataset.v)">${main}<span class="tap-hint">탭하여 적용</span></div>${alts.length?`<div class="talts">${alts.map(a=>`<div class="talt" data-v="${a.replace(/"/g,'&quot;')}" onclick="useTone(this.dataset.v)">${a}</div>`).join('')}</div>`:''}`;
  ts.classList.add('show');
}
function useTone(v){document.getElementById('inp').value=v;document.getElementById('tsug')?.classList.remove('show');document.getElementById('wb')?.classList.remove('show');document.getElementById('inp').focus()}

// ═══ SEND ═══
let replyTimer=null;
function doSend(){
  const el=document.getElementById('inp');const v=el.value.trim();if(!v||!curChat)return;
  curChat.msgs.push({s:'me',t:v,tm:now()});
  el.value='';el.style.height='auto';renderMsgs();renderList();
  document.getElementById('tsug')?.classList.remove('show');
  document.getElementById('erec')?.classList.remove('show');
  document.getElementById('wb')?.classList.remove('show');
  document.getElementById('rpv')?.classList.remove('show');
  document.getElementById('pkr')?.classList.remove('show');
  // Smart contextual auto-reply — cancel previous pending reply
  if(replyTimer)clearTimeout(replyTimer);
  const c=curChat;
  replyTimer=setTimeout(()=>{
    replyTimer=null;
    if(curChat?.id!==c.id)return; // switched chat
    const reply=genReply(v,c);
    if(reply){c.msgs.push(reply);renderMsgs();renderList()}
  },1500+Math.random()*1500);
}

// ═══ SMART REPLY — context-aware ═══
function genReply(userMsg,chat){
  const low=userMsg.toLowerCase();
  const s=chat.group?pick(['김대리','이사원','박과장','정인턴']):chat.name;
  // Get last non-me message for context continuity
  const lastOther=chat.msgs.filter(m=>m.s!=='me').slice(-1)[0];
  const lastOtherText=lastOther?.t||'';

  // ── Sarah: English ──
  if(chat.name?.includes('Sarah')){
    if(low.includes('not sure')||low.includes('interpret'))return{s,t:pick(['Yeah, it\'s tricky with emojis across cultures 🤔','Right? 👍 can mean different things depending on where you\'re from','We should probably ask them directly to be safe']),tm:now()};
    if(low.includes('thank')||low.includes('thx'))return{s,t:pick(['You\'re welcome! 😊','Happy to help!','Anytime 🙂']),tm:now()};
    if(low.includes('sure')||low.includes('yes')||low.includes('ok'))return{s,t:pick(['Great! I\'ll set up the meeting 📅','Perfect, let\'s do 2pm?','Sounds good 👍']),tm:now()};
    if(low.includes('send')||low.includes('share')||low.includes('doc'))return{s,t:pick(['Got it, I\'ll review it 👍','Thanks! Will check and get back to you','Received, looking at it now 🙂']),tm:now()};
    if(low.includes('sorry')||low.includes('apolog'))return{s,t:pick(['No worries at all!','That\'s totally fine, don\'t worry about it 🙂','No problem!']),tm:now()};
    if(low.includes('?'))return{s,t:pick(['Good question, let me check','I\'ll look into it and get back to you 🤔','Hmm, I think so but let me confirm']),tm:now()};
    return{s,t:pick(['Got it!','Thanks for the update 🙂','Noted, will follow up','Sounds good!']),tm:now()};
  }

  // ── 개인 채팅: 맥락 따라 대화 이어가기 ──
  if(chat.type==='personal'){
    // 이모지 해석 대화 이어가기
    if(low.includes('🙂')||low.includes('미소')||low.includes('냉소')||lastOtherText.includes('🙂'))return{s,t:pick(['ㅋㅋ 그니까 🙂 이거 진짜 애매해','맞아 화난 건지 괜찮은 건지 모르겠음 😅','그래서 나는 🙂 안 쓰려고 해 ㅋㅋ','아마 괜찮은 거 아닐까? 🤔']),tm:now()};
    if(low.includes('맞')||low.includes('진짜')||low.includes('그니까'))return{s,t:pick(['ㅋㅋ 그래서 요즘 이모지 쓸 때 고민됨','맞아 특히 윗사람한테 보낼 때 😅','나도 🫠','ㅇㅇ 진짜']),tm:now()};
    if(low.includes('ㅋㅋ')||low.includes('ㅎㅎ'))return{s,t:pick(['ㅋㅋㅋ','ㅋㅋㅋㅋ 진짜','😂😂','ㅋㅋ 웃기지']),tm:now()};
    if(low.includes('밥')||low.includes('먹')||low.includes('뭐 해'))return{s,t:pick(['ㅇㅇ 좋아! 뭐 먹을까?','맛있는 거 먹자 😊','주말에 어때?','좋아좋아!']),tm:now()};
    if(low.includes('?'))return{s,t:pick(['ㅇㅇ!','글쎄 🤔','ㅋㅋ 몰라~','왜?? 😂']),tm:now()};
    if(chat.name==='엄마'){
      if(low.includes('네')||low.includes('먹'))return{s,t:pick(['잘 먹어~ ❤️','건강 챙겨!','오늘 뭐 했어?','주말에 집에 와~']),tm:now()};
      return{s,t:pick(['알겠어~ 😊','엄마도 보고싶어 ❤️','건강 챙기고~','ㅋㅋ 그래그래']),tm:now()};
    }
    return{s,t:pick(['ㅇㅋ!','ㅋㅋ','ㅇㅇ','오키!','👍']),tm:now()};
  }

  // ── 업무 공식: 상사/교수 답장 ──
  if(chat.formal){
    if(low.includes('확인')||low.includes('알겠'))return{s,t:pick(['네 감사합니다.','수고하세요 🙂','좋습니다, 확인하겠습니다.','네.']),tm:now()};
    if(low.includes('보내')||low.includes('제출')||low.includes('전달'))return{s,t:pick(['잘 받았습니다. 검토 후 연락드리겠습니다.','감사합니다, 확인하겠습니다 👍','네, 잘 받았습니다.']),tm:now()};
    if(low.includes('감사')||low.includes('고마'))return{s,t:pick(['네, 수고하세요.','감사합니다 🙂','좋은 하루 보내세요.']),tm:now()};
    if(low.includes('죄송')||low.includes('미안'))return{s,t:pick(['괜찮습니다.','다음부터 주의해주세요.','네, 확인했습니다.']),tm:now()};
    if(low.includes('?'))return{s,t:pick(['확인해보겠습니다.','잠시만요, 확인 후 말씀드리겠습니다.','좋은 질문이네요 🤔']),tm:now()};
    // 교수님이 추가 지시
    if(chat.name?.includes('교수'))return{s,t:pick(['네 알겠습니다.','참고하겠습니다.','발표 준비도 같이 해주세요.','다음 미팅에서 논의합시다.']),tm:now()};
    return{s,t:pick(['네 알겠습니다.','확인했습니다 👍','감사합니다.']),tm:now()};
  }

  // ── 업무 동료: 이모지 해석 대화 자연스럽게 ──
  if(low.includes('🙃')||low.includes('뭔 뜻')||low.includes('무슨 뜻')||low.includes('괜찮'))return{s,t:pick(['나도 잘 모르겠어 🤔 그냥 장난일 수도?','ㅋㅋ 그거 진짜 애매하지','아마 괜찮은 거 아닐까? 근데 🙃 이거 좀 무섭긴 해','팀장님 스타일상 그냥 확인 의미일 듯 👍']),tm:now()};
  if(low.includes('확인')||low.includes('봤'))return{s,t:pick(['ㅇㅋ 고마워!','👍','ㅇㅇ 확인했어~']),tm:now()};
  if(low.includes('이모지')||low.includes('헷갈'))return{s,t:pick(['ㅋㅋ 나도 헷갈려 😅','이모지 해석 진짜 사람마다 다름','그래서 중요한 건 글로 쓰는 게 나은 듯 🤔']),tm:now()};
  if(low.includes('?'))return{s,t:pick(['ㅇㅇ!','음 잠깐만 🤔','확인해볼게!','글쎄 🤔']),tm:now()};
  return{s,t:pick(['ㅇㅋ!','👍','ㅇㅇ 알겠어!','확인!']),tm:now()};
}

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function quickRx(idx,emoji){
  const msg=curChat.msgs[idx];
  if(!msg.rx)msg.rx=[];
  // Check if same emoji already exists, increment count
  const existing=msg.rx.find(r=>r.e===emoji);
  if(existing)existing.c++;
  else msg.rx.push({e:emoji,c:1});
  renderMsgs();
}

// ═══ TOKENS ═══
function addSt(e,l){const c=curChat;for(let i=c.msgs.length-1;i>=0;i--){if(c.msgs[i].s!=='me'){if(!c.msgs[i].rx)c.msgs[i].rx=[];c.msgs[i].rx.push({e,c:1,note:l});renderMsgs();break}}}

// ═══ NOTE ═══
function openNote(idx){
  noteIdx=idx;noteEmoji='👍';
  const qe=['👍','✔','❤️','🙏','😊','🔥','⏳','✅','🚫','⚠️'];
  document.getElementById('ntC').innerHTML=`<h4>리액션 추가</h4><div class="epk">${qe.map(e=>`<button class="${e==='👍'?'sel':''}" onclick="noteEmoji='${e}';this.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('sel'));this.classList.add('sel')">${e}</button>`).join('')}</div><input type="text" id="ni" placeholder="메모 (선택)"><div class="nbtns"><button class="nc" onclick="document.getElementById('ntOv').classList.remove('show')">취소</button><button class="no" onclick="doNote()">추가</button></div>`;
  document.getElementById('ntOv').classList.add('show');
  setTimeout(()=>document.getElementById('ni')?.focus(),100);
}
function doNote(){const n=document.getElementById('ni')?.value.trim()||'';if(noteIdx!==null&&curChat.msgs[noteIdx]){if(!curChat.msgs[noteIdx].rx)curChat.msgs[noteIdx].rx=[];curChat.msgs[noteIdx].rx.push({e:noteEmoji,c:1,note:n});renderMsgs()}document.getElementById('ntOv').classList.remove('show')}

// ═══ SETTINGS ═══
