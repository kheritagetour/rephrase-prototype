<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P1 — Opt-in Pragmatic Dictionary</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#ece5dd;--mine:#dcf8c6;--other:#fff;--blue:#3b82f6;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--text:#111;--text2:#666;--text3:#999;--border:#e5e5e5}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Noto Sans KR',sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f0f0}

.phone{width:390px;height:740px;background:#fff;border-radius:32px;box-shadow:0 8px 40px rgba(0,0,0,.15);display:flex;flex-direction:column;overflow:hidden;border:1px solid #d0d0d0;position:relative}

/* Header */
.hdr{background:#1b2a4a;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:10px}
.hdr .av{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.hdr h3{font-size:15px;font-weight:600}
.hdr p{font-size:10px;opacity:.7}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:5px;background:var(--bg)}
.msg{max-width:72%;padding:8px 12px;border-radius:12px;font-size:14px;line-height:1.5;position:relative;animation:fin .25s}
@keyframes fin{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.msg.other{background:var(--other);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.msg.mine{background:var(--mine);align-self:flex-end;border-bottom-right-radius:4px}
.msg .sender{font-size:10px;font-weight:600;color:var(--text2);margin-bottom:2px}
.msg .time{font-size:9px;color:var(--text3);text-align:right;margin-top:2px}
.msg .hint{font-size:10px;color:var(--blue);margin-top:4px;cursor:pointer}
.msg .hint:hover{text-decoration:underline}

/* Emoji in msg — highlight */
.emoji-hl{cursor:pointer;position:relative;border-radius:4px;transition:.15s}
.emoji-hl:hover{background:rgba(59,130,246,.15)}

/* Composer */
.comp-wrap{border-top:1px solid var(--border);background:#fff}
.comp{display:flex;align-items:flex-end;padding:8px 12px 12px;gap:6px}
.comp textarea{flex:1;resize:none;border:1px solid var(--border);border-radius:20px;padding:9px 14px;font-size:13px;font-family:inherit;outline:none;min-height:38px;max-height:80px}
.comp textarea:focus{border-color:var(--blue)}
.btn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.emoji-b{background:none;font-size:20px;border:1px solid var(--border)}
.emoji-b:hover{border-color:var(--blue)}
.send-b{background:var(--blue);color:#fff}

/* Picker */
.picker{display:none;border-top:1px solid var(--border);background:#fff;max-height:220px;overflow-y:auto;padding:10px 14px}
.picker.show{display:block}
.sec-t{font-size:10px;font-weight:600;color:var(--text3);margin-bottom:6px;margin-top:10px}
.sec-t:first-child{margin-top:0}
.pgrid{display:flex;flex-wrap:wrap;gap:2px}
.ecell{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:24px;border-radius:10px;cursor:pointer;position:relative;transition:.15s}
.ecell:hover{background:#f0f0f0;transform:scale(1.12)}
.vd{position:absolute;top:2px;right:3px;width:8px;height:8px;border-radius:50%;border:2px solid #fff}
.vd.g{background:var(--green)}.vd.y{background:var(--yellow)}.vd.r{background:var(--red)}
.picker .legend{display:flex;gap:12px;margin-top:10px;padding:6px 8px;background:#f8f8f8;border-radius:8px;font-size:10px;color:var(--text2)}
.picker .legend span{display:flex;align-items:center;gap:4px}
.picker .legend .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Tooltip overlay */
.tt-ov{display:none;position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.tt-ov.show{display:flex}
.tt{background:#fff;border-radius:20px;padding:28px 24px;width:300px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.tt .big{font-size:56px;margin-bottom:6px}
.tt .mean{font-size:17px;font-weight:700}
.tt .sub{font-size:12px;color:var(--text3);margin:2px 0 14px}
.dbar{display:flex;border-radius:8px;overflow:hidden;height:30px;margin-bottom:8px}
.dbar .seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.seg.pos{background:var(--green)}.seg.neu{background:var(--yellow)}.seg.neg{background:var(--red)}
.dleg{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
.dleg span{font-size:10px;padding:3px 8px;border-radius:6px}
.dleg .pos{background:#dcfce7;color:#166534}.dleg .neu{background:#fef9c3;color:#854d0e}.dleg .neg{background:#fee2e2;color:#991b1b}
.tt .cultural{margin-top:10px;padding:10px;border-radius:10px;background:#fef3c7;font-size:11px;color:#92400e;text-align:left;line-height:1.5}
.tt .a11y{margin-top:8px;padding:10px;border-radius:10px;background:#eff6ff;font-size:11px;color:#1e40af;text-align:left;line-height:1.5}
.tt .close{margin-top:14px;padding:8px 24px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:13px;cursor:pointer}
.tt .close:hover{background:#f5f5f5}

.date-sep{text-align:center;font-size:11px;color:var(--text3);background:rgba(255,255,255,.7);display:inline-block;align-self:center;padding:3px 12px;border-radius:8px;margin:6px 0}
</style>
</head>
<body>
<div class="phone">
  <div class="hdr">
    <div class="av">박</div>
    <div><h3>박동료</h3><p>업무 채팅</p></div>
  </div>
  <div class="tt-ov" id="ttOv" onclick="if(event.target===this)this.classList.remove('show')">
    <div class="tt" id="ttCard"></div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="comp-wrap">
    <div class="comp">
      <button class="btn emoji-b" onclick="document.getElementById('picker').classList.toggle('show')">😊</button>
      <textarea id="input" rows="1" placeholder="메시지 입력..."></textarea>
      <button class="btn send-b" onclick="send()">↑</button>
    </div>
  </div>
  <div class="picker" id="picker">
    <div class="sec-t">이모지 (길게 눌러서 의미 확인)</div>
    <div class="pgrid" id="pgrid"></div>
    <div class="legend">
      <span><div class="dot" style="background:var(--green)"></div> 해석 안정</span>
      <span><div class="dot" style="background:var(--yellow)"></div> 주의 필요</span>
      <span><div class="dot" style="background:var(--red)"></div> 해석 분산 높음</span>
    </div>
  </div>
</div>

<script>
const ED={
  '✔':{v:'g',m:'확인 · 완료',d:[{l:'완료/확인',p:85,t:'pos'},{l:'무성의',p:10,t:'neu'},{l:'짜증',p:5,t:'neg'}],a11y:'작업 완료를 확인하는 기능적 신호'},
  '👍':{v:'y',m:'좋아요 · 알겠어요',d:[{l:'긍정/동의',p:60,t:'pos'},{l:'무관심',p:25,t:'neu'},{l:'비꼼',p:15,t:'neg'}],a11y:'동의 또는 승인의 표시'},
  '🙂':{v:'r',m:'미소 · 괜찮아요',d:[{l:'친근함',p:35,t:'pos'},{l:'어색함',p:35,t:'neu'},{l:'비꼼/냉소',p:30,t:'neg'}],a11y:'표면적 미소 — 냉소 가능성 있음'},
  '🙏':{v:'y',m:'감사 · 부탁',d:[{l:'감사',p:50,t:'pos'},{l:'부탁',p:35,t:'neu'},{l:'문화차이',p:15,t:'neg'}],cultural:'일부 문화권에서 "high-five"로 해석됩니다. 파리 협업 시 racism으로 오해받을 수 있어 주의가 필요합니다. (Q-15 [U6])',a11y:'감사 또는 부탁 — 문화권별 해석 차이'},
  '😅':{v:'y',m:'곤란 · 민망',d:[{l:'민망/곤란',p:50,t:'neu'},{l:'유머',p:30,t:'pos'},{l:'짜증',p:20,t:'neg'}],a11y:'곤란한 상황을 가볍게 표현'},
  '👀':{v:'r',m:'관심 · 감시',d:[{l:'관심/흥미',p:40,t:'pos'},{l:'감시',p:35,t:'neu'},{l:'의심/비꼼',p:25,t:'neg'}],a11y:'주시 또는 관심 — 의심으로도 해석 가능'},
  '😂':{v:'r',m:'웃김 · 조롱',d:[{l:'진짜 웃김',p:40,t:'pos'},{l:'과장된 웃음',p:30,t:'neu'},{l:'조롱/비웃음',p:30,t:'neg'}],a11y:'강한 웃음 — 진심 또는 조롱'},
  '😊':{v:'g',m:'기쁨 · 따뜻함',d:[{l:'따뜻함',p:80,t:'pos'},{l:'형식적',p:15,t:'neu'},{l:'어색함',p:5,t:'neg'}],a11y:'따뜻한 감정의 표현'},
  '🤔':{v:'y',m:'생각 중 · 의심',d:[{l:'궁금',p:55,t:'neu'},{l:'의심',p:30,t:'neg'},{l:'흥미',p:15,t:'pos'}],a11y:'생각 중이거나 의문 표현'},
};
const emojis=['🙂','👍','🙏','😅','👀','😂','✔','😊','🤔'];

const msgs=[
  {s:'박동료',t:'어제 리뷰 피드백 반영했어!',time:'1:05 PM'},
  {s:'박동료',t:'확인해봐 🙂',time:'1:06 PM'},
  {s:'me',t:'고마워~ 👍',time:'1:10 PM'},
  {s:'박동료',t:'근데 이거 좀 급한데 봐줄 수 있어? 👀',time:'1:12 PM'},
  {s:'박동료',t:'😅 미안 갑자기 부탁해서',time:'1:13 PM'},
  {s:'박동료',t:'🙏',time:'1:14 PM'},
];

let lt=null;

function init(){
  renderMsgs();
  buildPicker();
  document.getElementById('input').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
  });
}

function renderMsgs(){
  const el=document.getElementById('msgs');
  el.innerHTML='<div class="date-sep">오늘</div>';
  msgs.forEach(msg=>{
    const me=msg.s==='me';
    const div=document.createElement('div');
    div.className=`msg ${me?'mine':'other'}`;

    // Highlight emojis in text for long-press
    let html=msg.t.replace(/([\p{Emoji_Presentation}\p{Emoji}\uFE0F]+)/gu,(m)=>{
      if(ED[m]) return `<span class="emoji-hl" data-e="${m}">${m}</span>`;
      return m;
    });

    div.innerHTML=`${!me?`<div class="sender">${msg.s}</div>`:''}${html}<div class="time">${msg.time}</div>`;
    if(!me){
      // Hint text
      const ems=msg.t.match(/([\p{Emoji_Presentation}\p{Emoji}\uFE0F])/gu);
      if(ems&&ems.some(e=>ED[e]&&(ED[e].v==='r'||ED[e].v==='y'))){
        const hint=document.createElement('div');
        hint.className='hint';
        hint.textContent='💡 이모지를 길게 눌러 의미를 확인하세요';
        hint.onclick=()=>{
          const e=ems.find(e=>ED[e]);
          if(e) showTT(e);
        };
        div.appendChild(hint);
      }
    }

    // Long press on emoji highlights
    div.querySelectorAll('.emoji-hl').forEach(span=>{
      span.addEventListener('mousedown',()=>{lt=setTimeout(()=>showTT(span.dataset.e),400)});
      span.addEventListener('mouseup',()=>clearTimeout(lt));
      span.addEventListener('mouseleave',()=>clearTimeout(lt));
      span.addEventListener('click',()=>showTT(span.dataset.e));
    });

    el.appendChild(div);
  });
  el.scrollTop=el.scrollHeight;
}

function buildPicker(){
  const grid=document.getElementById('pgrid');
  emojis.forEach(e=>{
    const cell=document.createElement('div');
    cell.className='ecell';
    const d=ED[e];
    cell.innerHTML=e+(d?`<span class="vd ${d.v}"></span>`:'');
    cell.onclick=()=>{document.getElementById('input').value+=e;document.getElementById('picker').classList.remove('show')};
    cell.addEventListener('mousedown',()=>{lt=setTimeout(()=>showTT(e),400)});
    cell.addEventListener('mouseup',()=>clearTimeout(lt));
    cell.addEventListener('mouseleave',()=>clearTimeout(lt));
    grid.appendChild(cell);
  });
}

function showTT(emoji){
  const d=ED[emoji];if(!d)return;
  const card=document.getElementById('ttCard');
  card.innerHTML=`
    <div class="big">${emoji}</div>
    <div class="mean">${d.m}</div>
    <div class="sub">이 이모지의 해석 분포</div>
    <div class="dbar">${d.d.map(x=>`<div class="seg ${x.t}" style="width:${x.p}%">${x.p}%</div>`).join('')}</div>
    <div class="dleg">${d.d.map(x=>`<span class="${x.t}">${x.l} ${x.p}%</span>`).join('')}</div>
    ${d.cultural?`<div class="cultural">🌍 <b>문화 차이 주의</b><br>${d.cultural}</div>`:''}
    ${d.a11y?`<div class="a11y">♿ <b>접근성 의미</b><br>Screen reader: "${d.a11y}"</div>`:''}
    <button class="close" onclick="document.getElementById('ttOv').classList.remove('show')">닫기</button>`;
  document.getElementById('ttOv').classList.add('show');
}

// Auto-reply scenarios
const REPLIES=[
  {after:6, replies:[
    {t:'ㅋㅋ 그래 고마워!',delay:1500},
    {t:'아 그리고 내일 미팅 시간 바뀌었대 🤔',delay:3000},
  ]},
  {after:7, replies:[
    {t:'👍',delay:1000},
  ]},
  {after:8, replies:[
    {t:'ㅇㅋ 확인했어 🙂',delay:1500},
    {t:'근데 이 부분은 좀 이상한데? 😅',delay:3500},
  ]},
  {after:10, replies:[
    {t:'아 맞다 Sarah가 🙏 보냈는데 이거 뭔 뜻이야?',delay:2000},
  ]},
  {after:11, replies:[
    {t:'ㅇㅋ 고마워!',delay:1500},
    {t:'나도 이모지 의미 헷갈릴 때 많아 👀',delay:3000},
  ]},
];

let replyIdx=0;

function send(){
  const input=document.getElementById('input');
  const v=input.value.trim();if(!v)return;
  msgs.push({s:'me',t:v,time:new Date().toLocaleTimeString('ko-KR',{hour:'numeric',minute:'2-digit'})});
  input.value='';renderMsgs();
  document.getElementById('picker').classList.remove('show');

  // Trigger auto-replies
  const scenario=REPLIES.find(r=>r.after===msgs.length);
  if(scenario){
    scenario.replies.forEach(r=>{
      setTimeout(()=>{
        msgs.push({s:'박동료',t:r.t,time:new Date().toLocaleTimeString('ko-KR',{hour:'numeric',minute:'2-digit'})});
        renderMsgs();
      },r.delay);
    });
  }
}

init();
</script>
</body>
</html>
